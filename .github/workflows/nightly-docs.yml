name: Nightly Docs Agent

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no PR created)'
        required: false
        default: 'false'
        type: boolean
      force:
        description: 'Force run even if no changes since last run'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-docs
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for git diff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config --global user.name "${GIT_USER_NAME:-aguyaharonyair}"
          git config --global user.email "${GIT_USER_EMAIL:-242132053+aguyaharonyair@users.noreply.github.com}"

      - name: Run Nightly Docs Agent
        id: nightly-docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: pnpm nightly-docs $ARGS"
          pnpm nightly-docs $ARGS

      - name: Upload state artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-docs-state
          path: .ai-docs/nightly-docs-state.json
          retention-days: 30
