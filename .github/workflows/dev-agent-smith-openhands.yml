name: OpenHands Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: openhands-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  openhands:
    if: contains(github.event.comment.body, '@openhands-agent')
    uses: OpenHands/OpenHands/.github/workflows/openhands-resolver.yml@main
    with:
      macro: '@openhands-agent'
      max_iterations: 25
      target_branch: 'main'
    secrets:
      LLM_API_KEY: ${{ secrets.AI_KEY }}
      LLM_BASE_URL: ${{ secrets.AI_BASE_URL }}
      LLM_MODEL: ${{ secrets.AI_MODEL }}
