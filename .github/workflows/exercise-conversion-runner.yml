name: Exercise Conversion Runner

# This workflow runs the PDF to exercises conversion job runner
# Executes every 5 minutes to process queued conversion jobs
#
# Required GitHub Secrets (set in repo Settings > Secrets > Actions):
# - CRON_SECRET: Secret token for authenticating cron requests (must match CRON_SECRET env var)
#
# Required GitHub Variables (set in repo Settings > Variables > Actions):
# - NEXT_PUBLIC_SERVER_URL: Base URL of the deployed application (e.g., https://your-app.vercel.app)

on:
  schedule:
    # Run every 15 minutes (reduced from 5 to save CI resources)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

concurrency:
  group: exercise-conversion-runner
  cancel-in-progress: false

jobs:
  run-conversion:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Call runner endpoint
        id: runner
        run: |
          RESPONSE=$(curl -s -X POST "$NEXT_PUBLIC_SERVER_URL/api/exercises/convert/runner" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          # Store response for potential use in later steps
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          # Exit with error if request failed (non-2xx)
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Runner request failed with status $HTTP_CODE"
            exit 1
          fi

          # Parse response to check if job was processed
          PROCESSED=$(echo "$BODY" | jq -r '.processed // false')
          if [ "$PROCESSED" = "true" ]; then
            echo "Job processed successfully"
          else
            echo "No jobs to process"
          fi
