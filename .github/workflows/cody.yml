# Cody - Runs multi-agent pipeline in CI via OpenCode GitHub mode
# Triggers: workflow_dispatch, issue_comment (@cody <subcommand>)

name: cody

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to run'
        required: true
        type: string
      mode:
        description: 'Pipeline mode: spec, impl, rerun, full, status'
        required: false
        type: string
        default: 'full'
      clarify:
        description: 'Run clarify stage (opt-in Q&A loop, default: skip)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run mode (no actual execution)'
        required: false
        type: boolean
        default: false
      feedback:
        description: 'Feedback for rerun mode'
        required: false
        type: string
        default: ''
      from_stage:
        description: 'Stage to restart from (for rerun)'
        required: false
        type: string
        default: ''

  issue_comment:
    types: [created]

# Concurrency: task_id for dispatch, issue.number for comments
concurrency:
  group: cody-${{ github.event.inputs.task_id || github.event.issue.number }}
  cancel-in-progress: false

# Permissions: parse job needs write for error comments, orchestrate job needs more
permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  # Job 1: Parse trigger, validate inputs, gate execution
  # Only run for workflow_dispatch or comments containing @cody
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@cody'))
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      mode: ${{ steps.parse.outputs.mode }}
      clarify: ${{ steps.parse.outputs.clarify }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
      from_stage: ${{ steps.parse.outputs.from_stage }}
      feedback: ${{ steps.parse.outputs.feedback }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      valid: ${{ steps.parse.outputs.valid }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      comment_body: ${{ steps.parse.outputs.comment_body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/cody
          sparse-checkout-cone-mode: true

      # For comments: validate safety filters before parsing
      - name: Validate comment trigger safety
        if: github.event_name == 'issue_comment'
        id: safety
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR: ${{ github.event.comment.user.login }}
          ASSOCIATION: ${{ github.event.comment.author_association }}
        run: ./scripts/cody/parse-safety.sh

      # Add reaction to acknowledge command (shows instantly on the comment)
      - name: Acknowledge command with reaction
        if: github.event_name == 'issue_comment' && steps.safety.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content=eyes

      # Parse command: dispatch inputs forwarded, comment body passed to orchestrator
      - name: Parse command inputs
        id: parse
        env:
          # Safety
          SAFETY_VALID: ${{ steps.safety.outputs.valid }}
          SAFETY_REASON: ${{ steps.safety.outputs.reason }}
          # Dispatch inputs
          DISPATCH_TASK_ID: ${{ github.event.inputs.task_id }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DISPATCH_FEEDBACK: ${{ github.event.inputs.feedback }}
          DISPATCH_FROM_STAGE: ${{ github.event.inputs.from_stage }}
          DISPATCH_CLARIFY: ${{ github.event.inputs.clarify }}
          # Comment inputs (for orchestrator to parse)
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # GitHub context (needed by script to detect trigger type)
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: ./scripts/cody/parse-inputs.sh

  # Job 1b: Notify on parse errors (invalid commands)
  notify-parse-error:
    needs: parse
    if: >-
      needs.parse.outputs.valid == 'false' &&
      needs.parse.outputs.issue_number != '' &&
      github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post error comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ needs.parse.outputs.issue_number }} \
            --body "⚠️ Invalid \`@cody\` command. Use: \`@cody [spec|impl|rerun|full|status] [task-id] [options]\`"

  # Job 2: Orchestrate - run the pipeline
  orchestrate:
    needs: parse
    if: needs.parse.outputs.valid == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write # OpenCode GitHub App OIDC
      contents: write # Branch/commit operations
      pull-requests: write # Create PRs, post comments
      issues: write # Post status comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Checkout feature branch if exists
        if: needs.parse.outputs.task_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_ID: ${{ needs.parse.outputs.task_id }}
        run: ./scripts/cody/checkout-task-branch.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Configure git identity for commits in CI
      - name: Configure git identity
        run: |
          git config --global user.email "242132053+aguyaharonyair@users.noreply.github.com"
          git config --global user.name "aguyaharonyair"

      - name: Run Cody
        env:
          # GitHub token for gh CLI (GH_PAT takes precedence for PR creation)
          GH_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}

          # LLM provider keys (all available)
          # Note: GOOGLE_GENERATIVE_AI_API_KEY is for Vercel AI SDK (@ai-sdk/google),
          # GEMINI_API_KEY is for Google's own SDK (@google/generative-ai)
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Parsed inputs from parse job
          TASK_ID: ${{ needs.parse.outputs.task_id }}
          MODE: ${{ needs.parse.outputs.mode }}
          CLARIFY: ${{ needs.parse.outputs.clarify }}
          DRY_RUN: ${{ needs.parse.outputs.dry_run }}
          FEEDBACK: ${{ needs.parse.outputs.feedback }}
          FROM_STAGE: ${{ needs.parse.outputs.from_stage }}
          ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
          TRIGGER_TYPE: ${{ needs.parse.outputs.trigger_type }}
          COMMENT_BODY: ${{ needs.parse.outputs.comment_body }}

          # GitHub context
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/cody/run-cody.sh

      - name: Upload artifacts
        if: always() && needs.parse.outputs.task_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: cody-${{ needs.parse.outputs.task_id }}-${{ github.run_id }}
          path: .tasks/${{ needs.parse.outputs.task_id }}/
          retention-days: 7

      # Post completion comment removed (BUG-F fix):
      # cody.ts already posts completion/failure comments via postComment()
      # Having both caused duplicate comments on issues
