name: Publish Dev to Main

on:
  issues:
    types: [labeled]

jobs:
  create-pr:
    if: github.event.label.name == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if dev is ahead of main
        id: check
        run: |
          AHEAD=$(git rev-list --count origin/main..origin/dev)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -eq 0 ]; then
            echo "Nothing to publish — dev is up to date with main"
          fi

      - name: Check for existing publish PR
        if: steps.check.outputs.ahead != '0'
        id: existing
        run: |
          PR_NUMBER=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Create PR from dev to main
        if: steps.check.outputs.ahead != '0' && steps.existing.outputs.pr_number == ''
        id: create
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head dev \
            --title "Publish dev → production (${{ steps.check.outputs.ahead }} commits)" \
            --body "$(cat <<'EOF'
          ## Publish to Production

          Automated PR created via Cody dashboard publish.

          Closes #${{ github.event.issue.number }}

          Once CI passes, merge via the dashboard or GitHub.
          EOF
          )")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Comment on issue with PR link
        if: steps.check.outputs.ahead != '0'
        run: |
          PR_NUMBER="${{ steps.create.outputs.pr_number || steps.existing.outputs.pr_number }}"
          if [ -n "$PR_NUMBER" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --body "🚀 PR #${PR_NUMBER} created from \`dev\` → \`main\`. Waiting for CI to pass before merge."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Close issue if nothing to publish
        if: steps.check.outputs.ahead == '0'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ Nothing to publish — dev is already up to date with main."
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
