# Cody - Runs multi-agent pipeline in CI via OpenCode GitHub mode
# Triggers: workflow_dispatch, issue_comment (/cody <subcommand>)

name: cody

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to run'
        required: true
        type: string
      mode:
        description: 'Pipeline mode: spec, impl, rerun, full, status'
        required: false
        type: string
        default: 'full'
      dry_run:
        description: 'Dry run mode (no actual execution)'
        required: false
        type: boolean
        default: false
      feedback:
        description: 'Feedback for rerun mode'
        required: false
        type: string
        default: ''
      from_stage:
        description: 'Stage to restart from (for rerun)'
        required: false
        type: string
        default: ''

  issue_comment:
    types: [created]

# Concurrency: task_id for dispatch, issue.number for comments
concurrency:
  group: cody-${{ github.event.inputs.task_id || github.event.issue.number }}
  cancel-in-progress: false

# Permissions: parse job needs write for error comments, orchestrate job needs more
permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  # Job 1: Parse trigger, validate inputs, gate execution
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      mode: ${{ steps.parse.outputs.mode }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
      from_stage: ${{ steps.parse.outputs.from_stage }}
      feedback: ${{ steps.parse.outputs.feedback }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      valid: ${{ steps.parse.outputs.valid }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      comment_body: ${{ steps.parse.outputs.comment_body }}
    steps:
      # For comments: validate safety filters before parsing
      - name: Validate comment trigger safety
        if: github.event_name == 'issue_comment'
        id: safety
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR: ${{ github.event.comment.user.login }}
          ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          # Bot filter: ignore comments from known bot accounts
          if [[ "$AUTHOR" == "github-actions[bot]" ]] || [[ "$AUTHOR" == *"bot"* ]]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "reason=bot" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Author association: only OWNER, MEMBER, COLLABORATOR
          if [[ "$ASSOCIATION" != "OWNER" ]] && [[ "$ASSOCIATION" != "MEMBER" ]] && [[ "$ASSOCIATION" != "COLLABORATOR" ]]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "reason=unauthorized" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Pattern: must match ^/cody (with optional trailing space)
          if ! echo "$COMMENT_BODY" | grep -qE '^/cody([[:space:]]|$)'; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "reason=pattern" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "valid=true" >> $GITHUB_OUTPUT

      # Parse command: dispatch inputs forwarded, comment body passed to orchestrator
      - name: Parse command inputs
        id: parse
        env:
          # Safety
          SAFETY_VALID: ${{ steps.safety.outputs.valid }}
          SAFETY_REASON: ${{ steps.safety.outputs.reason }}
          # Dispatch inputs
          DISPATCH_TASK_ID: ${{ github.event.inputs.task_id }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DISPATCH_FEEDBACK: ${{ github.event.inputs.feedback }}
          DISPATCH_FROM_STAGE: ${{ github.event.inputs.from_stage }}
          # Comment inputs (for orchestrator to parse)
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Default outputs
          echo "task_id=" >> $GITHUB_OUTPUT
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "dry_run=false" >> $GITHUB_OUTPUT
          echo "from_stage=" >> $GITHUB_OUTPUT
          echo "feedback=" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "trigger_type=" >> $GITHUB_OUTPUT
          echo "comment_body=" >> $GITHUB_OUTPUT
          echo "valid=false" >> $GITHUB_OUTPUT

          # Handle workflow_dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$DISPATCH_TASK_ID" ]]; then
              echo "=== Error: task_id is required for dispatch ==="
              exit 0
            fi
            echo "task_id=$DISPATCH_TASK_ID" >> $GITHUB_OUTPUT
            echo "mode=${DISPATCH_MODE:-full}" >> $GITHUB_OUTPUT
            echo "dry_run=$DISPATCH_DRY_RUN" >> $GITHUB_OUTPUT
            echo "feedback=$DISPATCH_FEEDBACK" >> $GITHUB_OUTPUT
            echo "from_stage=$DISPATCH_FROM_STAGE" >> $GITHUB_OUTPUT
            echo "trigger_type=dispatch" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "=== Parsed dispatch: task_id=$DISPATCH_TASK_ID, mode=${DISPATCH_MODE:-full} ==="
            exit 0
          fi

          # Handle issue_comment
          # Safety check first
          if [[ "$SAFETY_VALID" != "true" ]]; then
            echo "=== Safety check failed: $SAFETY_REASON ==="
            exit 0
          fi

          # Pass raw comment body to orchestrator for parsing
          # Escape for JSON/GITHUB_OUTPUT (replace newlines, quotes)
          # Use printf '%s' to avoid echo's trailing newline being captured by jq
          ESCAPED_BODY=$(printf '%s' "$COMMENT_BODY" | jq -Rs .)
          echo "comment_body=$ESCAPED_BODY" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "trigger_type=comment" >> $GITHUB_OUTPUT
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "=== Passing comment to orchestrator for parsing ==="

  # Job 2: Orchestrate - run the pipeline
  orchestrate:
    needs: parse
    if: needs.parse.outputs.valid == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write # OpenCode GitHub App OIDC
      contents: write # Branch/commit operations
      pull-requests: write # Create PRs, post comments
      issues: write # Post status comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OpenCode CLI setup — replicated from anomalyco/opencode/github@latest action.yml
      # We don't use the Action directly because the orchestrator spawns
      # `opencode github run` multiple times (once per pipeline stage).
      - name: Get opencode version
        id: oc-version
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        uses: actions/cache@v4
        id: oc-cache
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.oc-version.outputs.version }}

      - name: Install opencode
        if: steps.oc-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        run: |
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          $HOME/.opencode/bin/opencode --version

      - name: Run Cody
        env:
          # GitHub token for gh CLI
          GH_TOKEN: ${{ github.token }}

          # LLM provider keys (all available)
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # OpenCode model configuration
          OPENCODE_MODEL: minimax-coding-plan/MiniMax-M2.5

          # Parsed inputs from parse job
          TASK_ID: ${{ needs.parse.outputs.task_id }}
          MODE: ${{ needs.parse.outputs.mode }}
          DRY_RUN: ${{ needs.parse.outputs.dry_run }}
          FEEDBACK: ${{ needs.parse.outputs.feedback }}
          FROM_STAGE: ${{ needs.parse.outputs.from_stage }}
          ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
          TRIGGER_TYPE: ${{ needs.parse.outputs.trigger_type }}
          COMMENT_BODY: ${{ needs.parse.outputs.comment_body }}

          # GitHub context
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/cody/run-cody.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cody-${{ needs.parse.outputs.task_id }}-${{ github.run_id }}
          path: .tasks/${{ needs.parse.outputs.task_id }}/
          retention-days: 7

      - name: Post completion comment
        if: always() && needs.parse.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ job.status }}
          TASK_ID: ${{ needs.parse.outputs.task_id }}
          ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$STATUS" == "success" ]]; then
            gh issue comment $ISSUE_NUMBER --body "✅ Cody completed for \`$TASK_ID\`
          Run: $RUN_URL"
          else
            gh issue comment $ISSUE_NUMBER --body "❌ Cody failed for \`$TASK_ID\`
          Run: $RUN_URL"
          fi
