# Supervisor - Monitors Cody failures, analyzes, and triggers retries

name: supervisor

on:
  issue_comment:
    types: [created]

# Concurrency: prevent parallel supervisor runs for the same issue
concurrency:
  group: supervisor-${{ github.event.issue.number }}
  cancel-in-progress: false

# Permissions: needs to read issues, check out branches, and trigger workflows
permissions:
  issues: write
  contents: read
  actions: write

jobs:
  # Job 1: Validate comment trigger safety
  # Trigger on: github-actions[bot] OR github-actions posting failure comments
  # Matches: "Pipeline failed", "failed at stage" patterns
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'issue_comment' &&
      (github.event.comment.user.login == 'github-actions[bot]' || github.event.comment.user.login == 'github-actions') &&
      (contains(github.event.comment.body, 'Pipeline failed') || contains(github.event.comment.body, 'failed at stage'))
    outputs:
      valid: ${{ steps.safety.outputs.valid }}
      task_id: ${{ steps.extract.outputs.task_id }}
    steps:
      # Safety validation: different rules for supervisor (accepts bot failure comments)
      - name: Validate comment trigger safety
        id: safety
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR: ${{ github.event.comment.user.login }}
        run: ./scripts/cody/parse-safety-supervisor.sh

      - name: Extract task ID
        id: extract
        if: steps.safety.outputs.valid == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Handle both "/cody rerun task-id" format and "❌ Pipeline failed for `task-id`:" format
          TASK_ID=$(echo "$COMMENT_BODY" | grep -oP '`\K[0-9]{6}-[\w-]+(?=`)' | head -1)
          if [ -z "$TASK_ID" ]; then
            TASK_ID=$(echo "$COMMENT_BODY" | grep -oP 'for \K[0-9]{6}-[\w-]+(?=:' | head -1)
          fi
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          if [ -n "$TASK_ID" ]; then
            echo "Task ID found: $TASK_ID"
          else
            echo "No task ID found in comment"
          fi

  # Job 2: Run supervisor
  supervise:
    needs: validate
    if: needs.validate.outputs.valid == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GH_TOKEN: ${{ github.token }}
      TASK_ID: ${{ needs.validate.outputs.task_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout task branch
        if: needs.validate.outputs.task_id != ''
        run: |
          echo "Checking out branch for task: $TASK_ID"
          TASK_ID="$TASK_ID" pnpm tsx scripts/cody/checkout-task-branch.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Supervisor
        if: needs.validate.outputs.task_id != ''
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          TASK_ID: ${{ needs.validate.outputs.task_id }}
          REPO: ${{ github.repository }}
        run: pnpm tsx scripts/supervisor/supervisor.ts

      - name: No task ID found
        if: needs.validate.outputs.task_id == ''
        run: echo "No valid task ID found, supervisor exiting"
