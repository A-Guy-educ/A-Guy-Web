name: AI Docs Refresh (Daily)

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-docs-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate all AI docs (indexes + patterns + docs)
        run: pnpm run ai:generate-all

      - name: Generate agent indexes (readme + route + collection-slug maps)
        run: pnpm run ai:generate-all-indexes

      - name: Validate agent indexes
        run: pnpm run ai:validate-indexes

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/ai-docs-refresh
          base: dev
          title: 'chore(ai-docs): refresh indexes'
          commit-message: 'chore(ai-docs): refresh indexes'
          body: |
            Automated daily refresh of AI docs artifacts.

            Generated + validated:
            - `.ai-docs/indexes/*` (docs, patterns, readme, route, collection-slug)
            - `.ai-docs/quick-reference/**`
            - `.ai-docs/schemas/**`
            - `.ai-docs/BOOTSTRAP.md`

            Commands:
            - `pnpm run ai:generate-all`
            - `pnpm run ai:generate-all-indexes`
            - `pnpm run ai:docs:validate`
            - `pnpm run ai:validate-indexes`
          labels: |
            automation
            ai-docs
          delete-branch: false
          add-paths: |
            .ai-docs/indexes/**
            .ai-docs/quick-reference/**
            .ai-docs/schemas/**
            .ai-docs/BOOTSTRAP.md
