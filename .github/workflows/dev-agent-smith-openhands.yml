name: Agent Orchestrator

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-orchestrator-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  orchestrator:
    if: >
      github.event.issue.state == 'open' &&
      github.event.sender.type != 'Bot' &&
      startsWith(github.event.comment.body, '@agent')

    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      mode: ${{ steps.decide.outputs.mode }}
      issue_number: ${{ steps.context.outputs.issue_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set issue context
        id: context
        run: |
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Guard - prevent duplicate runs
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | grep -q '^agent:running$' && exit 1 || exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark issue as running
        run: |
          gh issue edit "${{ github.event.issue.number }}" --add-label "agent:running"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide execution mode
        id: decide
        run: |
          if echo "${{ github.event.comment.body }}" | grep -q "@agent simple"; then
            echo "mode=simple" >> $GITHUB_OUTPUT
          else
            echo "mode=openhands" >> $GITHUB_OUTPUT
          fi

  simple:
    needs: orchestrator
    if: needs.orchestrator.outputs.mode == 'simple'
    runs-on: ubuntu-latest
    steps:
      - name: Run simple patch engine
        run: |
          echo "Running simple diff/patch engine"

      - name: Mark issue as done
        run: |
          gh issue edit "${{ needs.orchestrator.outputs.issue_number }}" --remove-label "agent:running" --add-label "agent:done"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  openhands:
    needs: orchestrator
    if: needs.orchestrator.outputs.mode == 'openhands'
    uses: OpenHands/OpenHands/.github/workflows/openhands-resolver.yml@0.62.0
    with:
      macro: '@agent-orchestrator'
      max_iterations: 25
      target_branch: dev
      pr_type: ready
    secrets:
      LLM_API_KEY: ${{ secrets.AI_KEY }}
      LLM_BASE_URL: ${{ secrets.AI_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      PAT_USERNAME: ${{ secrets.PAT_USERNAME }}

  done:
    needs: [orchestrator, simple, openhands]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mark issue as done
        if: >-
          needs.orchestrator.result == 'success' &&
          (needs.simple.result == 'success' || needs.simple.result == 'skipped') &&
          (needs.openhands.result == 'success' || needs.openhands.result == 'skipped')
        run: |
          gh issue edit "${{ needs.orchestrator.outputs.issue_number }}" --remove-label "agent:running" --add-label "agent:done"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark issue as error
        if: >-
          needs.orchestrator.result == 'failure' ||
          needs.simple.result == 'failure' ||
          needs.openhands.result == 'failure'
        run: |
          gh issue edit "${{ needs.orchestrator.outputs.issue_number }}" --remove-label "agent:running" --add-label "agent:error"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
