version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: payload-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - payload-network

volumes:
  mongodb_data:

networks:
  payload-network:
    driver: bridge
