name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # To create releases and push tags
  issues: write # To comment on released issues
  pull-requests: write # To comment on merged PRs

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run if the commit is not from semantic-release itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    env:
      # DATABASE_URL is required for postinstall -> generate:types
      # Falls back to a dummy connection string if secret is not available
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://localhost:27017/test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for semantic-release
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Verify SLACK_WEBHOOK_URL is set (optional)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "✅ SLACK_WEBHOOK_URL is configured - Slack notifications will be sent"
          else
            echo "⚠️  SLACK_WEBHOOK_URL not set - Slack notifications disabled"
            echo "To enable: Add SLACK_WEBHOOK_URL secret in GitHub repository settings"
          fi

      - name: Verify DATABASE_URL is set
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "DATABASE_URL is set: true"
          else
            echo "DATABASE_URL is set: false"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SKIP_HOOKS: 1
        run: pnpm exec semantic-release

      - name: Create release summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Release workflow completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the [Releases page](https://github.com/${{ github.repository }}/releases) for the new release." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              echo "📢 Slack notification sent successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "📢 Slack notifications disabled (no SLACK_WEBHOOK_URL secret)" >> $GITHUB_STEP_SUMMARY
              echo "To enable: Add SLACK_WEBHOOK_URL in [GitHub Secrets](https://github.com/${{ github.repository }}/settings/secrets/actions)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ No release created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Possible reasons:" >> $GITHUB_STEP_SUMMARY
            echo "- No releasable commits since last release" >> $GITHUB_STEP_SUMMARY
            echo "- Commits only contain types that don't trigger releases (ci, chore, test, style)" >> $GITHUB_STEP_SUMMARY
          fi
