name: Release (with PR)

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main # Trigger on push to main - creates PR for release commit

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip if already on a release branch (prevent infinite loops)
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://localhost:27017/test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release (dry-run to get version info)
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate changelog and get version without actually releasing
          pnpm exec semantic-release --dry-run 2>&1 | tee release-output.txt
          # Extract version from output
          VERSION=$(grep -oP 'version \K[0-9]+\.[0-9]+\.[0-9]+' release-output.txt | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        if: steps.semantic-release.outputs.VERSION != ''
        run: |
          VERSION="${{ steps.semantic-release.outputs.VERSION }}"
          BRANCH_NAME="release/v${VERSION}"
          git checkout -b "$BRANCH_NAME"

      - name: Commit release changes
        if: steps.semantic-release.outputs.VERSION != ''
        run: |
          VERSION="${{ steps.semantic-release.outputs.VERSION }}"
          git add CHANGELOG.md package.json
          git commit -m "chore(release): ${VERSION} [skip ci]"

      - name: Push release branch
        if: steps.semantic-release.outputs.VERSION != ''
        run: |
          VERSION="${{ steps.semantic-release.outputs.VERSION }}"
          BRANCH_NAME="release/v${VERSION}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.semantic-release.outputs.VERSION != ''
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Release v${{ steps.semantic-release.outputs.VERSION }}',
              head: 'release/v${{ steps.semantic-release.outputs.VERSION }}',
              base: 'main',
              body: [
                '## Release v${{ steps.semantic-release.outputs.VERSION }}',
                '',
                'This PR contains the release changes:',
                '- Updated version in package.json',
                '- Updated CHANGELOG.md',
                '',
                '### Release Notes',
                'The changelog has been updated with all commits since the last release.',
                '',
                '**Please review and merge to trigger the actual release.**',
              ].join('\n'),
            });
            console.log('Created PR:', pullRequest.html_url);
