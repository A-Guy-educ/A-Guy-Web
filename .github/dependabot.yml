version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'A-Guy-educ/maintainers'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      # Group development dependencies together
      dev-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # Group production dependencies together
      prod-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    # Ignore major version updates for critical packages (review manually)
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'payload'
        update-types: ['version-update:semver-major']
      - dependency-name: '@payloadcms/*'
        update-types: ['version-update:semver-major']

  # Docker dependencies (if docker-compose.yml exists)
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'docker'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'github-actions'
