name: Repo Hygiene Report (Daily)

on:
  schedule:
    # Daily at 08:00 UTC (spread from 02:45 to reduce contention)
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: repo-hygiene-report
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate repo hygiene report
        run: pnpm run repo:hygiene:report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene-report
          path: .ai-docs/reports/repo-hygiene-report.md
          if-no-files-found: error
