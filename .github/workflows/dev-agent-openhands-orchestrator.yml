name: Mrs. Smith

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: write

# IMPORTANT:
# One run per comment. Prevents "canceling since a higher priority request exists"
concurrency:
  group: mrs-smith-${{ github.repository }}-${{ github.event.issue.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  orchestrator:
    if: ${{ github.event.issue.state == 'open' && github.event.sender.type != 'Bot' && contains(github.event.comment.body, '@mrs-smith') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      mode: ${{ steps.decide.outputs.mode }}
      issue_number: ${{ steps.context.outputs.issue_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set issue context
        id: context
        run: |
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Mark issue as running
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = context.payload.issue.number

            // best-effort: label might already exist from other runs
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['agent:running'],
            }).catch(() => {})

      - name: Decide execution mode
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || "";
            const isSimple = /@mrs-smith\b.*\s--simple\b/i.test(body);
            const mode = isSimple ? "simple" : "openhands";

            core.info(`DECIDE: mode=${mode}`);
            core.setOutput("mode", mode);

  simple:
    needs: orchestrator
    if: ${{ needs.orchestrator.outputs.mode == 'simple' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run simple patch engine
        run: |
          echo "Running simple diff/patch engine"
          echo "TODO: implement your simple engine here"

  openhands:
    needs: orchestrator
    if: ${{ needs.orchestrator.outputs.mode == 'openhands' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenHands
        run: |
          python -m pip install --upgrade pip
          # Match your previous workflow tag. If this exact version doesn't exist in PyPI,
          # remove the pin and just use: pip install openhands
          pip install "openhands==0.62.0"

      - name: Run resolver with external timeout
        env:
          # GitHub auth (same secrets you already have)
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_USERNAME: ${{ secrets.PAT_USERNAME }}

          # LLM config (same secrets you already have)
          LLM_API_KEY: ${{ secrets.AI_KEY }}
          LLM_BASE_URL: ${{ secrets.AI_BASE_URL }}
          LLM_MODEL: minimax/MiniMax-M2.1

          # Inputs
          ISSUE_NUMBER: ${{ needs.orchestrator.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Repo: $REPO"
          echo "Issue: #$ISSUE_NUMBER"

          # Some implementations expect these env vars:
          export GITHUB_TOKEN="$PAT_TOKEN"
          export GITHUB_USERNAME="$PAT_USERNAME"

          # Hard stop: SIGTERM at 12m, SIGKILL 30s later if still alive
          timeout -k 30s 12m python -m openhands.resolver.resolve_issue \
            --repo "$REPO" \
            --issue-number "$ISSUE_NUMBER" \
            --macro "@mrs-smith" \
            --max-iterations 25 \
            --target-branch "dev" \
            --llm-model "minimax/MiniMax-M2.1" \
            --pr-type "ready"

  done:
    needs: [orchestrator, simple, openhands]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mark issue as done
        if: ${{ needs.orchestrator.result == 'success' && (needs.simple.result == 'success' || needs.simple.result == 'skipped') && (needs.openhands.result == 'success' || needs.openhands.result == 'skipped') }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = Number('${{ needs.orchestrator.outputs.issue_number }}')

            // Remove running label (best-effort)
            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'agent:running' }).catch(() => {})

            // Add done label
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['agent:done'] }).catch(() => {})

      - name: Mark issue as error
        if: ${{ needs.orchestrator.result != 'success' || needs.simple.result == 'failure' || needs.openhands.result == 'failure' || needs.simple.result == 'cancelled' || needs.openhands.result == 'cancelled' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = Number('${{ needs.orchestrator.outputs.issue_number }}')

            // Remove running label (best-effort)
            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'agent:running' }).catch(() => {})

            // Add error label
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['agent:error'] }).catch(() => {})
