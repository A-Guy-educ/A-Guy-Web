name: Preview Comment

on:
  deployment_status:

jobs:
  comment:
    name: Comment on PR with Preview URL
    # Only run when deployment succeeds and it's a preview environment
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      deployments: read

    steps:
      - name: Get PR number from deployment
        id: get-pr
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.getDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id
            });

            // Extract PR number from ref (e.g., 'refs/pull/123/merge')
            const ref = deployment.data.ref;
            const prMatch = ref.match(/refs\/pull\/(\d+)\//);

            if (prMatch) {
              return prMatch[1];
            }

            // Fallback: search for PR with this head ref
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${ref}`
            });

            if (prs.data.length > 0) {
              return prs.data[0].number;
            }

            return null;

      - name: Comment on PR
        if: steps.get-pr.outputs.result != 'null'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.get-pr.outputs.result }};
            const url = '${{ github.event.deployment_status.target_url }}';
            const environment = '${{ github.event.deployment_status.environment }}';
            const sha = '${{ github.event.deployment.sha }}';
            const shortSha = sha.substring(0, 7);

            // Check if we already commented on this PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🚀 Preview Deployment Ready')
            );

            const commentBody = `## 🚀 Preview Deployment Ready

            Your preview deployment is ready for testing!

            ### 🔗 Quick Links

            | Link | URL |
            |------|-----|
            | **🌐 Preview Site** | [${url}](${url}) |
            | **👤 Admin Panel** | [${url}/admin](${url}/admin) |
            | **📖 API** | [${url}/api](${url}/api) |

            ### 📋 Testing Checklist

            - [ ] Homepage loads correctly
            - [ ] Admin login works
            - [ ] Forms submit successfully
            - [ ] Images load properly
            - [ ] No console errors
            - [ ] Responsive design looks good

            ### ℹ️ Deployment Info

            - **Environment**: ${environment}
            - **Commit**: [\`${shortSha}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha})
            - **Deployed at**: ${new Date().toLocaleString('en-US', { timeZone: 'UTC', hour12: false })} UTC

            ---

            *This preview will stay active until the PR is closed. The URL updates automatically with each new commit.*
            `;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated existing preview comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new preview comment');
            }
