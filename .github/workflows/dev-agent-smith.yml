# -----------------------------------------------------------------------------
# AGENT CODE WORKFLOW
# -----------------------------------------------------------------------------
#
# HOW TO ACTIVATE THE AGENT:
#
# 1. @agent-code <request>   -> Full overwrite method (recommended)
#    Example: "@agent-code Update the README with installation steps"
#
# 2. @agent-diff <request>   -> Diff method (for small changes)
#    Example: "@agent-diff Fix the typo in src/utils.ts"
#
# OVERRIDE TOKENS:
#    @agent-code allow:workflows  -> Allow editing .github/workflows/
#
# DENYLISTED PATHS (blocked by default):
#    .env, .env.*, pnpm-lock.yaml, package.json, .github/workflows/*
#
# LIMITS:
#    Max 10 files per request
#    Max 500KB output
#
# -----------------------------------------------------------------------------

name: Agent Code (Multi-Format Testing)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-code-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # JOB 1: THE NEW ROBUST METHOD (Full Overwrite) - HARDENED
  run-overwrite-agent:
    if: contains(github.event.comment.body, '@agent-code')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Call AI (Full Files) - HARDENED
        id: agent
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_KEY: ${{ secrets.AI_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          cat > call-agent.mjs <<'MJS'
          import { writeFileSync } from "node:fs";

          const system = "You are a senior code agent. Output changes in format: FILE: path/to/file.ext\nCONTENT:\n[Full file content]\nEND_FILE\nNO markdown, NO explanations.";
          const user = `Repo: ${process.env.REPO}\nIssue: #${process.env.ISSUE_NUMBER}\nRequest:\n${process.env.COMMENT_BODY}`;

          const res = await fetch(`${process.env.AI_BASE_URL}/chat/completions`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${process.env.AI_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: process.env.AI_MODEL, messages: [{role:"system", content:system}, {role:"user", content:user}], temperature: 0.1 }),
          });

          // FAIL-FAST: Check HTTP response
          if (!res.ok) {
            const errorText = await res.text().substring(0, 500);
            const errorMsg = `API Error ${res.status} ${res.statusText}: ${errorText}`;
            writeFileSync("agent.error", errorMsg, "utf8");
            console.error("❌", errorMsg);
            process.exit(1);
          }

          const data = await res.json();

          // FAIL-FAST: Validate JSON structure
          const content = data?.choices?.[0]?.message?.content;
          if (typeof content !== "string" || content.trim().length === 0) {
            const errorMsg = "AI response empty or invalid: missing choices[0].message.content";
            writeFileSync("agent.error", errorMsg, "utf8");
            console.error("❌", errorMsg);
            process.exit(1);
          }

          writeFileSync("agent.output", content, "utf8");
          MJS
          node call-agent.mjs

      - name: Apply changes - HARDENED
        id: apply
        run: |
          set -euo pipefail

          # Check if agent.output exists
          if [ ! -f agent.output ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- STEP 1: FORMAT VALIDATION ---

          # Check for at least one FILE: line
          FILE_COUNT=$(grep -c '^FILE: ' agent.output || true)
          if [ -z "$FILE_COUNT" ] || [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ VALIDATION FAILED: No FILE: markers found in output" >&2
            echo "validation_error=no_file_markers" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Check for balanced FILE/END_FILE pairs
          END_COUNT=$(grep -c '^END_FILE$' agent.output || true)
          if [ "$FILE_COUNT" -ne "$END_COUNT" ]; then
            echo "❌ VALIDATION FAILED: Unbalanced FILE/END_FILE ($FILE_COUNT FILE vs $END_COUNT END_FILE)" >&2
            echo "validation_error=unbalanced_markers" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Check each FILE block has CONTENT:
          if ! awk '/^FILE: / { file=1; content=0 } /^CONTENT:/ { content=1 } /^END_FILE/ { if (!content) { print "ERROR: Missing CONTENT: in block"; exit 1 } file=0; content=0 } END { if (file) exit 1 }' agent.output; then
            echo "❌ VALIDATION FAILED: Found FILE block without CONTENT:" >&2
            echo "validation_error=missing_content" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Reject markdown fences
          if grep -q '^```' agent.output; then
            echo "❌ VALIDATION FAILED: Output contains markdown fences" >&2
            echo "validation_error=markdown_fences" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # --- STEP 2: BLAST RADIUS LIMITS ---

          # Max files: 10
          if [ "$FILE_COUNT" -gt 10 ]; then
            echo "❌ VALIDATION FAILED: Too many files ($FILE_COUNT, max: 10)" >&2
            echo "validation_error=too_many_files" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Max bytes: 500KB
          TOTAL_BYTES=$(wc -c < agent.output)
          if [ "$TOTAL_BYTES" -gt 512000 ]; then
            echo "❌ VALIDATION FAILED: Output too large ($TOTAL_BYTES bytes, max: 512000)" >&2
            echo "validation_error=output_too_large" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✓ Format validation passed ($FILE_COUNT files, $TOTAL_BYTES bytes)"

          # --- STEP 3: SANDBOX SETUP ---

          # Check for allow token
          COMMENT_BODY="${{ github.event.comment.body }}"
          ALLOW_WORKFLOWS=$(echo "$COMMENT_BODY" | grep -c '@agent-code allow:workflows' || true)

          # Create temp directory
          TEMP_DIR=".agent_tmp_$$"
          mkdir -p "$TEMP_DIR"

          # --- STEP 4: PATH SANDBOXING + WRITE TO TEMP ---

          # Process each FILE block with sandboxing
          awk -v temp_dir="$TEMP_DIR" -v allow_workflows="$ALLOW_WORKFLOWS" '
            /^FILE: / {
              file = $2;

              # BLOCK: Path traversal
              if (file ~ /\.\./) {
                print "❌ BLOCKED: Path traversal in " file > "/dev/stderr";
                exit 1;
              }

              # BLOCK: Absolute paths (Unix)
              if (file ~ /^\//) {
                print "❌ BLOCKED: Absolute Unix path " file > "/dev/stderr";
                exit 1;
              }

              # BLOCK: Windows drive paths
              if (file ~ /^[A-Za-z]:\\/) {
                print "❌ BLOCKED: Windows drive path " file > "/dev/stderr";
                exit 1;
              }

              # BLOCK: Denylisted paths
              if (file ~ /\.env(\.[a-zA-Z0-9_-]+)?$/) {
                print "❌ BLOCKED: Denylisted .env file " file > "/dev/stderr";
                exit 1;
              }
              if (file ~ /pnpm-lock\.yaml$/) {
                print "❌ BLOCKED: Denylisted pnpm-lock.yaml" > "/dev/stderr";
                exit 1;
              }
              if (file ~ /package\.json$/) {
                print "❌ BLOCKED: Denylisted package.json" > "/dev/stderr";
                exit 1;
              }
              if (file ~ /\.github\/workflows\// && allow_workflows == 0) {
                print "❌ BLOCKED: .github/workflows/ without allow:workflows token" > "/dev/stderr";
                exit 1;
              }

              # Create directory structure in temp dir
              split(file, parts, "/");
              dir = "";
              for (i = 1; i < length(parts); i++) {
                dir = (dir == "" ? parts[i] : dir "/" parts[i]);
                system("mkdir -p " temp_dir "/" dir);
              }

              current_file = temp_dir "/" file;
              next;
            }
            /^CONTENT:/ { writing = 1; next; }
            /^END_FILE/ { writing = 0; close(current_file); next; }
            writing { print $0 >> current_file; }
          ' agent.output || {
            rm -rf "$TEMP_DIR"
            echo "❌ SANDBOX FAILED: Path validation or write error" >&2
            echo "validation_error=sandbox_failed" >> "$GITHUB_OUTPUT"
            exit 1;
          }

          echo "✓ Sandbox validation passed"

          # --- STEP 5: MOVE TO REPO ---

          # Copy files from temp to repo
          cp -r "$TEMP_DIR"/* . 2>/dev/null || true

          # Count files actually written
          WRITTEN_COUNT=$(find "$TEMP_DIR" -type f | wc -l)

          # Cleanup temp and artifacts
          rm -rf "$TEMP_DIR"
          rm -f call-agent.mjs agent.output agent.error

          echo "✓ Applied $WRITTEN_COUNT file(s)"

          # Git operations
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT";
            echo "files_changed=$WRITTEN_COUNT" >> "$GITHUB_OUTPUT";
          else
            echo "changed=false" >> "$GITHUB_OUTPUT";
          fi

      - name: Create Pull Request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'agent-overwrite: apply changes for #${{ github.event.issue.number }}'
          title: 'Overwrite Suggestion for #${{ github.event.issue.number }}'
          branch: agent-overwrite-${{ github.event.issue.number }}
