# Cody - Runs multi-agent pipeline in CI via OpenCode GitHub mode
# Triggers: workflow_dispatch, issue_comment (@cody <subcommand>), push to dev/main (smoke test)

name: cody

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to run'
        required: true
        type: string
      mode:
        description: 'Pipeline mode: spec, impl, rerun, full, status'
        required: false
        type: string
        default: 'full'
      clarify:
        description: 'Run clarify stage (opt-in Q&A loop, default: skip)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run mode (no actual execution)'
        required: false
        type: boolean
        default: false
      feedback:
        description: 'Feedback for rerun mode'
        required: false
        type: string
        default: ''
      from_stage:
        description: 'Stage to restart from (for rerun)'
        required: false
        type: string
        default: ''
      runner:
        description: 'Where to run: github-hosted (default) or self-hosted (--local)'
        required: false
        type: choice
        options:
          - github-hosted
          - self-hosted
        default: 'github-hosted'
      version:
        description: 'Pipeline version (branch, tag, or commit). Overrides CODY_DEFAULT_VERSION'
        required: false
        type: string
        default: ''

  push:
    branches:
      - dev
      - main
    paths:
      - 'scripts/cody/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

  issue_comment:
    types: [created]

# Concurrency: task_id for dispatch, issue.number for comments
concurrency:
  group: cody-${{ github.event.inputs.task_id || github.event.issue.number }}
  cancel-in-progress: false

# Permissions: parse job needs write for error comments, orchestrate job needs more
permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  # Job 1: Parse trigger, validate inputs, gate execution
  # Only run for workflow_dispatch or comments containing @cody
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       (contains(github.event.comment.body, '@cody') ||
        contains(github.event.comment.body, '/cody')))
    env:
      GH_TOKEN: ${{ github.token }}
      CODY_DEFAULT_VERSION: cody-v1
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      mode: ${{ steps.parse.outputs.mode }}
      clarify: ${{ steps.parse.outputs.clarify }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
      from_stage: ${{ steps.parse.outputs.from_stage }}
      feedback: ${{ steps.parse.outputs.feedback }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      valid: ${{ steps.parse.outputs.valid }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
      comment_body: ${{ steps.parse.outputs.comment_body }}
      runner: ${{ steps.parse.outputs.runner }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/cody
          sparse-checkout-cone-mode: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # For comments: validate safety filters before parsing
      - name: Validate comment trigger safety
        if: github.event_name == 'issue_comment'
        id: safety
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR: ${{ github.event.comment.user.login }}
          ASSOCIATION: ${{ github.event.comment.author_association }}
        run: pnpm tsx scripts/cody/parse-safety.ts

      # Add reaction to acknowledge command (shows instantly on the comment)
      - name: Acknowledge command with reaction
        if: github.event_name == 'issue_comment' && steps.safety.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content=eyes

      # Parse command: dispatch inputs forwarded, comment body passed to orchestrator
      - name: Parse command inputs
        id: parse
        env:
          # Safety
          SAFETY_VALID: ${{ steps.safety.outputs.valid }}
          SAFETY_REASON: ${{ steps.safety.outputs.reason }}
          # Dispatch inputs
          DISPATCH_TASK_ID: ${{ github.event.inputs.task_id }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DISPATCH_FEEDBACK: ${{ github.event.inputs.feedback }}
          DISPATCH_FROM_STAGE: ${{ github.event.inputs.from_stage }}
          DISPATCH_CLARIFY: ${{ github.event.inputs.clarify }}
          DISPATCH_RUNNER: ${{ github.event.inputs.runner }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          # Comment inputs (for orchestrator to parse)
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # GitHub context (needed by script to detect trigger type)
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # Default version (can be overridden by explicit --version in command)
          CODY_DEFAULT_VERSION: ${{ env.CODY_DEFAULT_VERSION }}
        run: pnpm tsx scripts/cody/parse-inputs.ts

  # Job 1b: Notify on parse errors (invalid commands)
  notify-parse-error:
    needs: parse
    if: >-
      needs.parse.outputs.valid == 'false' &&
      needs.parse.outputs.issue_number != '' &&
      github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post error comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ needs.parse.outputs.issue_number }} \
            --body "⚠️ Invalid \`@cody\` command. Use: \`@cody [spec|impl|rerun|full|status] [task-id] [options]\`"

  # Smoke test: runs on push to dev/main to validate cody pipeline works
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run parse-inputs validation
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TASK_ID: ''
          DISPATCH_MODE: ''
          DISPATCH_DRY_RUN: 'false'
          DISPATCH_FEEDBACK: ''
          DISPATCH_FROM_STAGE: ''
          DISPATCH_CLARIFY: 'false'
          COMMENT_BODY: ''
          ISSUE_NUMBER: ''
          GITHUB_EVENT_NAME: 'push'
          SAFETY_VALID: 'true'
          SAFETY_REASON: ''
        run: pnpm tsx scripts/cody/parse-inputs.ts

      - name: Validate cody entry can be loaded
        run: pnpm tsx scripts/cody/entry.ts --help

      - name: Run actual pipeline (spec mode - runs taskify)
        env:
          GH_TOKEN: ${{ github.token }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          # Create simple test task
          mkdir -p .tasks/260225-smoke-test
          echo "# Task" > .tasks/260225-smoke-test/task.md
          echo "" >> .tasks/260225-smoke-test/task.md
          echo "Smoke test task" >> .tasks/260225-smoke-test/task.md

          # Run spec mode (will run taskify stage)
          pnpm cody --mode=spec --task-id=260225-smoke-test || true

          # Don't fail on stage errors, just verify files were created

      - name: Verify taskify produced valid output
        run: |
          # Verify task.json was created
          if [ ! -f ".tasks/260225-smoke-test/task.json" ]; then
            echo "ERROR: task.json was not created"
            exit 1
          fi

          # Verify it's valid JSON
          cat .tasks/260225-smoke-test/task.json | pnpm tsx -e "JSON.parse(require('fs').readFileSync(0, 'utf-8')); console.log('Valid JSON')"

          echo "SUCCESS: Pipeline smoke test passed"

  # Job 2: Orchestrate - run the pipeline
  orchestrate:
    needs: parse
    if: needs.parse.outputs.valid == 'true'
    runs-on: ${{ needs.parse.outputs.runner == 'self-hosted' && fromJSON('["self-hosted"]') || 'ubuntu-latest' }}
    timeout-minutes: 120
    permissions:
      id-token: write # OpenCode GitHub App OIDC
      contents: write # Branch/commit operations
      pull-requests: write # Create PRs, post comments
      issues: write # Post status comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout feature branch if exists
        if: needs.parse.outputs.task_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_ID: ${{ needs.parse.outputs.task_id }}
          ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
        run: pnpm tsx scripts/cody/checkout-task-branch.ts

      # Configure git identity for commits in CI
      - name: Configure git identity
        run: |
          git config --global user.email "242132053+aguyaharonyair@users.noreply.github.com"
          git config --global user.name "aguyaharonyair"

      # Overlay pipeline version (if specified)
      - name: Overlay pipeline version
        if: needs.parse.outputs.version != ''
        run: |
          VERSION_REF="${{ needs.parse.outputs.version }}"
          echo "Overlaying pipeline from: $VERSION_REF"

          # Fetch the ref (could be branch, tag, or commit)
          git fetch origin "$VERSION_REF" --depth=1 || true

          # Checkout only pipeline files from that ref (not the whole repo)
          # This preserves the feature branch and task files
          git checkout "origin/$VERSION_REF" -- scripts/cody/ .opencode/agents/ opencode.json 2>/dev/null || \
            git checkout "$VERSION_REF" -- scripts/cody/ .opencode/agents/ opencode.json 2>/dev/null || \
            echo "Warning: Could not overlay from $VERSION_REF, using current code"

          echo "Pipeline version: $VERSION_REF"

      - name: Run Cody
        env:
          # GitHub token for gh CLI (GH_PAT takes precedence for PR creation)
          GH_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}

          # Blob storage token for verify stage (unit tests need it)
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

          # Database URL for verify stage (unit tests need it)
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://localhost:27017/test' }}

          # LLM provider keys (all available)
          # Note: GOOGLE_GENERATIVE_AI_API_KEY is for Vercel AI SDK (@ai-sdk/google),
          # GEMINI_API_KEY is for Google's own SDK (@google/generative-ai)
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Parsed inputs from parse job
          TASK_ID: ${{ needs.parse.outputs.task_id }}
          MODE: ${{ needs.parse.outputs.mode }}
          CLARIFY: ${{ needs.parse.outputs.clarify }}
          DRY_RUN: ${{ needs.parse.outputs.dry_run }}
          FEEDBACK: ${{ needs.parse.outputs.feedback }}
          FROM_STAGE: ${{ needs.parse.outputs.from_stage }}
          ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
          TRIGGER_TYPE: ${{ needs.parse.outputs.trigger_type }}
          COMMENT_BODY: ${{ needs.parse.outputs.comment_body }}
          VERSION: ${{ needs.parse.outputs.version }}

          # GitHub context
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm cody

      - name: Upload artifacts
        if: always() && needs.parse.outputs.task_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: cody-${{ needs.parse.outputs.task_id }}-${{ github.run_id }}
          path: .tasks/${{ needs.parse.outputs.task_id }}/
          retention-days: 7

      # Clean workspace for self-hosted runners (no-op on GitHub-hosted since VM is discarded)
      - name: Cleanup workspace (self-hosted)
        if: always() && needs.parse.outputs.runner == 'self-hosted'
        run: |
          echo "=== Cleaning workspace for self-hosted runner ==="
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true
          rm -rf .next dist coverage .turbo .cache .eslintcache .vercel .output
          echo "✅ Workspace cleaned"

      # Post completion comment removed (BUG-F fix):
      # cody.ts already posts completion/failure comments via postComment()
      # Having both caused duplicate comments on issues
