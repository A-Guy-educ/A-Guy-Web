name: Atlas Integration Tests

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  atlas-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_ATLAS }}
      DATABASE_URL_ATLAS: ${{ secrets.DATABASE_URL_ATLAS }}
      USE_ATLAS: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'test-secret-for-ci' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Atlas vector search tests
        run: pnpm test:vector
