name: Media Expiry Cleanup

# This workflow cleans up expired ephemeral media files
# Used for chat attachments that have a 30-day retention policy
#
# Required GitHub Secrets (set in repo Settings > Secrets > Actions):
# - CRON_ENDPOINT: Base URL of the deployed application (e.g., https://your-app.vercel.app)
# - CRON_SECRET: Secret token for authenticating cron requests (must match CRON_SECRET env var)
#
# Note: Application config should use Config_entries in the admin panel.
# GitHub secrets are only for values needed by external CI/CD workflows.

on:
  schedule:
    # Run daily at 4 AM UTC (spread from 2 AM to reduce contention)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Call cleanup endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.CRON_ENDPOINT }}/api/cron/media-expiry" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" -ne 200 ]; then
            echo "Cleanup request failed with status $http_code"
            exit 1
          fi

          echo "Cleanup completed successfully"
