name: kody-watch

on:
  # Run on every PR merge to dev — creates GitHub issues for any failures found
  pull_request:
    types: [closed]
    branches: [dev]
  # Continuous monitoring: run daily but do NOT create issues (read-only digest)
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: 'Run without executing actions'
      agents:
        type: string
        default: ''
        description: 'Comma-separated agent names to run (functional,infra,analytics). Default: all'

concurrency:
  group: kody-watch
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Claude Code
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Kody Engine
        run: npm install -g @kody-ade/engine

      - name: Install LiteLLM proxy
        if: hashFiles('.kody/watch/agents/*/agent.json') != ''
        run: pip install 'litellm[proxy]' prisma && python -m prisma py fetch

      - name: Export project secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          echo "$ALL_SECRETS" | jq -r 'to_entries[] | select(.key | test("^(GITHUB_TOKEN)$") | not) | @json' | while IFS= read -r entry; do
            KEY=$(echo "$entry" | jq -r '.key')
            VALUE=$(echo "$entry" | jq -r '.value')
            DELIM="KODY_EOF_${KEY}"
            echo "${KEY}<<${DELIM}" >> $GITHUB_ENV
            echo "${VALUE}" >> $GITHUB_ENV
            echo "${DELIM}" >> $GITHUB_ENV
          done

      - name: Run Kody Watch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WATCH_DIGEST_ISSUE: ${{ vars.WATCH_DIGEST_ISSUE }}
          WATCH_DIGEST_ISSUE_FUNCTIONAL: ${{ vars.WATCH_DIGEST_ISSUE_FUNCTIONAL }}
          WATCH_DIGEST_ISSUE_INFRA: ${{ vars.WATCH_DIGEST_ISSUE_INFRA }}
          WATCH_DIGEST_ISSUE_ANALYTICS: ${{ vars.WATCH_DIGEST_ISSUE_ANALYTICS }}
          PREVIEW_URL: ${{ vars.PREVIEW_URL }}
          # Only create issues on PR merges and manual runs — not on scheduled runs
          DRY_RUN: ${{ inputs.dry_run || (github.event_name == 'schedule' && 'true') || 'false' }}
        run: |
          ARGS="watch"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          echo "Trigger: ${{ github.event_name }} | DRY_RUN: $DRY_RUN"
          kody-engine $ARGS

      - name: Upload watch memory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: watch-memory-${{ github.run_id }}
          path: .kody/memory/watch-*.json
          retention-days: 7
