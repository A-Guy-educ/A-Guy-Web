name: Merge Dev to Main

on:
  workflow_dispatch: # Manual trigger
  schedule:
    # Run weekly on Sunday at midnight UTC (optional - remove if you want manual only)
    - cron: '0 0 * * 0'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for proper merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main
        run: |
          # Checkout main branch
          git checkout main
          git pull origin main

          # Merge dev with strategy to prefer dev's changes
          git merge origin/dev --no-ff -m "chore: merge dev into main [skip ci]" || true

          # Check if there are conflicts
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Conflicts detected, resolving..."

            # For package-lock.json conflicts, use the version from dev
            if git diff --name-only --diff-filter=U | grep -q "package-lock.json"; then
              echo "Resolving package-lock.json conflict by using dev version"
              git checkout --theirs package-lock.json
              git add package-lock.json
            fi

            # For pnpm-lock.yaml conflicts, use the version from dev
            if git diff --name-only --diff-filter=U | grep -q "pnpm-lock.yaml"; then
              echo "Resolving pnpm-lock.yaml conflict by using dev version"
              git checkout --theirs pnpm-lock.yaml
              git add pnpm-lock.yaml
            fi

            # Check if there are still unresolved conflicts
            if git diff --name-only --diff-filter=U | grep -v "package-lock.json" | grep -v "pnpm-lock.yaml" | grep -q .; then
              echo "Error: There are unresolved conflicts beyond package lock files"
              git diff --name-only --diff-filter=U
              exit 1
            fi

            # Complete the merge
            git commit --no-edit
          fi

          # Push to main
          git push origin main

      - name: Create summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Successfully merged dev into main" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Merge failed - manual intervention required" >> $GITHUB_STEP_SUMMARY
          fi
