name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
      && (
        # Exclude pipeline commands (spec, impl, rerun, full, status)
        !contains(github.event.comment.body, '/oc spec') &&
        !contains(github.event.comment.body, '/oc impl') &&
        !contains(github.event.comment.body, '/oc rerun') &&
        !contains(github.event.comment.body, '/oc full') &&
        !contains(github.event.comment.body, '/oc status') &&
        !contains(github.event.comment.body, '/opencode spec') &&
        !contains(github.event.comment.body, '/opencode impl') &&
        !contains(github.event.comment.body, '/opencode rerun') &&
        !contains(github.event.comment.body, '/opencode full') &&
        !contains(github.event.comment.body, '/opencode status')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        with:
          model: minimax-coding-plan/MiniMax-M2.5
